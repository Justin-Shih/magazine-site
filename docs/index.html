<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magazine Site</title>
  <style>
    :root {
      --paper: #f7f6f2;
      --ink: #1e2732;
      --muted: #667085;
      --line: #d8ddd8;
      --accent: #0b6f78;
      --panel: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
      line-height: 1.7;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      width: min(980px, calc(100% - 36px));
      margin: 0 auto;
    }
    .masthead { padding: 30px 0 22px; }
    .kicker {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .subtitle { margin: 0; color: var(--muted); }
    main { padding: 28px 0 56px; }
    .issue-list {
      display: grid;
      gap: 14px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .issue {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .issue a {
      color: var(--ink);
      font-size: 20px;
      font-weight: 750;
      text-decoration: none;
    }
    .issue a:hover { color: var(--accent); }
    .issue p { margin: 6px 0 0; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="wrap masthead">
      <p class="kicker">Magazine Site</p>
      <h1>雜誌導出網站索引</h1>
      <p class="subtitle">每一期雜誌使用獨立目錄發布，避免後續期別覆蓋總入口。</p>
    </div>
  </header>
  <main>
    <div class="wrap">
      <ul class="issue-list">
        <li class="issue">
          <a href="source-april-2026-magazine-site/">Source April 2026 雙語雜誌筆記</a>
          <p>GitHub Pages path: <code>/source-april-2026-magazine-site/</code></p>
        </li>
      </ul>
    </div>
  </main>
</body>
</html>
